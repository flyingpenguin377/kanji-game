<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- ここが重要（アプリ名） -->
  <title>漢字ゲーム</title>
  <meta name="apple-mobile-web-app-title" content="漢字ゲーム">
  
  <!-- アプリっぽくする -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#dff4ff">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #dff4ff, #eef9ff);
      margin: 0;
      padding: 20px;
      color: #16324f;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      background: rgba(255,255,255,0.75);
      border-radius: 24px;
      padding: 24px 18px 32px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    h1 {
      font-size: 44px;
      margin: 8px 0 10px;
    }

    .penguin {
      font-size: 64px;
      margin-top: 10px;
    }

    .subtitle {
      font-size: 22px;
      margin: 6px 0 18px;
    }

    .status-box {
      background: #f5fcff;
      border: 3px solid #b8e7ff;
      border-radius: 18px;
      padding: 12px;
      margin: 14px auto;
      max-width: 420px;
    }

    #score, #highScore, #levelTitle, #result {
      font-size: 24px;
      margin: 10px 0;
    }

    #question {
      font-size: 32px;
      margin: 26px 0 18px;
      min-height: 52px;
    }

    #levelButtons {
      margin: 20px 0;
    }

    .level-btn, .choice-btn, #nextBtn, #restartBtn {
      font-size: 24px;
      padding: 14px;
      margin: 8px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.10);
    }

    .level-btn {
      background: white;
      border: 3px solid #b8e7ff;
    }

    .choice-btn {
      display: block;
      width: 260px;
      margin: 10px auto;
      background: white;
      border: 3px solid #d7efff;
    }

    #nextBtn { background: #ffe48a; }
    #restartBtn { background: #c9f2d0; }

    #result {
      font-weight: bold;
      min-height: 36px;
    }
  </style>
</head>

<body>
<div class="container">
  <div class="penguin">🐧</div>
  <h1>漢字ゲーム</h1>
  <div class="subtitle">ペンギンといっしょに がんばろう！</div>

  <div id="levelButtons">
    <p style="font-size:24px;">レベルをえらんでね</p>
    <button class="level-btn" onclick="startLevel(1)">レベル1</button>
    <button class="level-btn" onclick="startLevel(2)">レベル2</button>
    <button class="level-btn" onclick="startLevel(3)">レベル3</button>
    <button class="level-btn" onclick="startLevel(4)">レベル4</button>
  </div>

  <div class="status-box">
    <p id="levelTitle"></p>
    <p id="score">スコア: 0</p>
    <p id="highScore">ハイスコア: 0</p>
  </div>

  <p id="question">レベルを選んでね</p>
  <div id="choices"></div>
  <p id="result"></p>

  <button id="nextBtn" style="display:none;" onclick="nextQuestion()">つぎへ</button>
  <button id="restartBtn" style="display:none;" onclick="goHome()">レベルをえらぶ</button>
</div>

<script>
const data = {
1:[{q:"やまはどれ？",a:["川","山","田"],c:1}],
2:[{q:"かわはどれ？",a:["山","川","田"],c:1}],
3:[{q:"はやしはどれ？",a:["森","林","休"],c:1}],
4:[{q:"学校はどれ？",a:["学校","山","水"],c:0}]
};

let level=0, current=0, score=0;

function getHigh(){return localStorage.getItem("hs")||0;}
function setHigh(s){localStorage.setItem("hs",s);}

function startLevel(l){
level=l; current=0; score=0;
document.getElementById("levelButtons").style.display="none";
update(); show();
}

function update(){
document.getElementById("score").innerText="スコア:"+score;
document.getElementById("highScore").innerText="ハイスコア:"+getHigh();
}

function show(){
let q=data[level][current];
document.getElementById("question").innerText=q.q;
let html="";
q.a.forEach((c,i)=>{
html+=`<button class="choice-btn" onclick="check(${i})">${c}</button>`;
});
document.getElementById("choices").innerHTML=html;
}

function check(i){
let q=data[level][current];
if(i==q.c){score++; alert("せいかい！");}
else{alert("ちがう！");}
update();
current++;
if(current<data[level].length) show();
else{
if(score>getHigh()) setHigh(score);
document.getElementById("question").innerText="おわり！";
document.getElementById("choices").innerHTML="";
document.getElementById("restartBtn").style.display="block";
}
}

function goHome(){
location.reload();
}
</script>

</body>
</html>
